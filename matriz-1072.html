<div id="modalRequisito" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
    <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[92vh] overflow-y-auto">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-blue-600 to-blue-700 rounded-t-3xl">
            <h2 id="modalTitulo" class="text-lg font-bold text-white flex items-center gap-2">
                <i class="fas fa-search-plus"></i>
                <span>Nuevo Requisito Legal</span>
            </h2>
            <button id="cerrarModal" class="text-white/70 hover:text-white text-3xl leading-none">&times;</button>
        </div>
        
        <form id="formRequisito" class="p-7 space-y-5">
            <input type="hidden" id="requisitoId">
            
            <div class="relative">
                <label class="block text-xs font-bold text-blue-600 mb-1.5 uppercase tracking-wider">
                    <i class="fas fa-magic"></i> Buscador de Normas Sugeridas
                </label>
                <input type="text" id="normaSearch" list="listadoNormas" placeholder="Escribe '1072', '0312' o 'Alturas'..." 
                       class="w-full border-2 border-blue-100 bg-blue-50/30 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all font-medium">
                <datalist id="listadoNormas">
                    <option value="Decreto 1072 de 2015">Decreto Único Reglamentario del Sector Trabajo</option>
                    <option value="Resolución 0312 de 2019">Estándares Mínimos del SG-SST</option>
                    <option value="Resolución 4272 de 2021">Trabajo Seguro en Alturas</option>
                    <option value="Ley 1562 de 2012">Sistema General de Riesgos Laborales</option>
                    <option value="Resolución 2400 de 1979">Estatuto de Seguridad Industrial</option>
                </datalist>
                <p class="text-[10px] text-slate-400 mt-1">Selecciona una sugerencia para auto-completar el requisito.</p>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Norma / Ley</label>
                    <input type="text" id="norma" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Año</label>
                    <input type="number" id="anio" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Artículo(s) Sugerido(s)</label>
                <input type="text" id="articulos" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Descripción Técnica</label>
                <textarea id="descripcion" rows="4" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <button type="button" id="cancelarModal" class="px-5 py-2.5 font-bold text-slate-400 text-sm">Cancelar</button>
                <button type="submit" class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 text-sm">
                    Confirmar e Incluir
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // BASE DE DATOS DE NORMAS (MOTOR DE BÚSQUEDA)
    const DB_NORMAS = {
        "Decreto 1072 de 2015": {
            anio: 2015,
            articulos: "Capítulo 6 (Art. 2.2.4.6.1 al 2.2.4.6.37)",
            desc: "Establece las directrices de obligatorio cumplimiento para implementar el Sistema de Gestión de la Seguridad y Salud en el Trabajo (SG-SST)."
        },
        "Resolución 0312 de 2019": {
            anio: 2019,
            articulos: "Todo el documento",
            desc: "Define los estándares mínimos del SG-SST para personas naturales y jurídicas según su número de trabajadores y nivel de riesgo."
        },
        "Resolución 4272 de 2021": {
            anio: 2021,
            articulos: "Art. 1 - Art. 65",
            desc: "Establece los requisitos mínimos de seguridad para el desarrollo de trabajo en alturas."
        },
        "Ley 1562 de 2012": {
            anio: 2012,
            articulos: "Art. 1, 2 y 13",
            desc: "Modifica el sistema de riesgos laborales y dicta otras disposiciones en materia de salud ocupacional."
        }
    };

    // LÓGICA DEL MOTOR DE BÚSQUEDA
    document.getElementById('normaSearch').addEventListener('input', function(e) {
        const seleccion = e.target.value;
        if (DB_NORMAS[seleccion]) {
            const info = DB_NORMAS[seleccion];
            document.getElementById('norma').value = seleccion.split(' de ')[0];
            document.getElementById('anio').value = info.anio;
            document.getElementById('articulos').value = info.articulos;
            document.getElementById('descripcion').value = info.desc;
            
            // Efecto visual de éxito
            this.classList.add('border-emerald-400', 'bg-emerald-50');
            setTimeout(() => this.classList.remove('border-emerald-400', 'bg-emerald-50'), 1000);
        }
    });

    // ... (Mantén el resto de tus funciones de render, guardar y eliminar igual)
</script>
